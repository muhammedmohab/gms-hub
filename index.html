<!DOCTYPE html>
<html>

<head>
  <title>Grandma's Cookies 🍪</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍪</text></svg>">
  <link rel="stylesheet" href="style.css">
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>

<body>

  <header class="header">
    <div class="header-content">
      <h1>🍪 Grandma's House Alliance Hub 🍪</h1>
      <p class="subtitle">Welcome to Grandma's Secret Recipes & Strategies</p>
      <div class="scrolling-ribbon">
        <div class="ribbon-text">Loading...</div>
      </div>
      <div id="google_translate_element" class="translate-widget"></div>
    </div>
    <button class="drawer-toggle" aria-label="Open menu" aria-expanded="false">☰ Menu</button>
    <div class="drawer-backdrop" hidden></div>
    <aside class="drawer" aria-hidden="true">
      <div class="drawer-header">
        <span>Menu</span>
        <button class="drawer-close" aria-label="Close menu">×</button>
      </div>
      <div class="drawer-items"></div>
    </aside>
    <div class="tab-bar"></div>
  </header>

  <main class="main-content">
    <div class="tab-content"></div>
  </main>

  <div>
    <a href="https://discord.gg/rpHpJFGK" target="_blank" class="discord-button">🎮 Join Our Discord</a>
  </div>

  <footer class="footer">
    <div class="footer-content">
      <p>💛 Made with love by Grandma 💛</p>
      <p class="footer-text">All recipes and strategies carefully tested in the kitchen and on the battlefield</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="main.js"></script>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: '',
      }, 'google_translate_element');
    }
  </script>

</body>

</html>
